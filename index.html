<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Delay Visualiser</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="heading">
            <h1><a href="https://github.com/vantablackingout/ui-responsiveness-test">Project: UI Latency Simulator</a></h1>
            <h3>Version 1.2</h3>
        </div>

        <div class="container">

            <div class="box-wrapper">
                <p id="label1">Default</p>
                <div id="box1" class="box"></div>
                <p>Sub-100ms</p>
            </div>
            
            <div class="box-wrapper">
                <p id="label2">Default</p>
                <div id="box2" class="box"></div>
                <p>100ms</p>
            </div>
            
            <div class="box-wrapper">
                <p id="label3">Default</p>
                <div id="box3" class="box"></div>
                <p>800ms</p>
            </div>
        
        </div>

        <!-- this button is outside the container div since it is a sensible practice to keep Stage elements and Control elements separate and to center it a div of its own can be used -->
         <div class="button-area">
            <button id=startButton title="here's a tooltip for no special reason">Load 'Em</button>
         </div>

         <script src="script.js"></script>
    </body>
</html>
